#!/bin/bash
# 99-memory-hardening-v61.conf
# Aggressive IO/Memory tuning for 126GB workstation to prevent IO Thrashing/Livelock.
# Prevents "Wait for IO" deadlocks by forcing small, frequent writes.

# 1. IO Tuning (Dirty Ratios) - CRITICAL FOR SYSTEM RESPONSIVENESS
# Replaces percentage-based ratio (10% of 126GB = 12GB!) with fixed bytes.
# Force flushes every 500MB to avoid massive 12GB flush storms freezing the NVMe.
vm.dirty_bytes = 536870912       # 512MB
vm.dirty_background_bytes = 268435456  # 256MB
# Disable ratio-based tuning to ensure bytes setting takes precedence
vm.dirty_ratio = 0
vm.dirty_background_ratio = 0

# 2. Kernel Emergency Reserves - CRITICAL FOR SSH/NETWORK ALIVENESS
# Increase strict kernel reserve from ~64MB to 4GB.
# Ensures kernel always has atomic pages for network stack and OOM killer execution.
vm.min_free_kbytes = 4194304     # 4GB

# 3. OOM Killer Speed
# Kill the allocating task immediately. Don't scan list.
vm.oom_kill_allocating_task = 1

# 4. Swappiness
# Keep swapping delayed until needed, but allow it to prevent OOM.
vm.swappiness = 20

# 5. Panic on OOM (Optional: Set to 0 to prevent reboot loop, or 1 to reboot)
# We want to STAY ALIVE but kill process. So panic=0.
vm.panic_on_oom = 0

# 6. Admin Reserve (Already set, but reinforcing)
vm.admin_reserve_kbytes = 524288 # 512MB
