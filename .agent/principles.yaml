global:
  constitution: OMEGA_CONSTITUTION.md
  agents_entry: AGENTS.md
  project_manual: handover/README.md
  skills_root: .agent/skills

core_paths:
  kernel: omega_core/kernel.py
  math_core: omega_core/omega_math_core.py
  etl: omega_core/omega_etl.py
  config: config.py
  node_paths: configs/node_paths.py
  logger: omega_core/omega_log.py

shared_principles:
  - Read OMEGA_CONSTITUTION.md before any task.
  - ECONOPHYSICS SUPERSEDES SWE.
  - Delta = 0.5 is a universal constant (Sato 2025). Never optimize.
  - No hardcoded trading thresholds in production code.
  - Use Volume Clock. Never shard across Time axis.
  - Float64 only for physics math. Never downcast.
  - Train/val/test/backtest must be role-isolated and overlap-free.
  - Atomic parquet writes (.tmp then rename). Done markers for resume.
  - All node paths via configs/node_paths.py. No hardcoded paths.
  - Run PHYSICS_AUDIT before any engineering decision.

active_skills:
  - math_core
  - physics
  - engineering
  - hardcode_guard
  - data_integrity_guard
  - ops
  - omega_development
  - ai_handover
