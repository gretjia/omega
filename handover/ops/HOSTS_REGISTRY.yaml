policy:
  - "Non-secret metadata only."
  - "Never store private keys, passwords, or tokens."

hosts:
  omega_vm:
    alias: omega-vm
    host: 100.122.223.27
    user: zephryj
    os: linux
    role: "main control node / tailscale exit node"
    repo_root: "/home/zephryj/work/Omega_vNext"
    ssh_config: "/home/zephryj/.ssh/config"
    gcloud_config: "/home/zephryj/.config/gcloud"
    probe:
      - "hostname"
      - "tailscale status"
      - "gcloud auth list"

  linux1:
    alias: linux1-lx
    host: 100.64.97.113
    local_ip: 192.168.3.113
    user: zepher
    os: linux
    role: "worker stage1/stage2"
    repo_root: "/home/zepher/work/Omega_vNext"
    outputs:
      stage1_base_l1: "/omega_pool/parquet_data/v62_base_l1/host=linux1"
      stage2_feature_l2: "/omega_pool/parquet_data/v62_feature_l2/host=linux1"
    cache_root: "/home/zepher/framing_cache"
    logs:
      stage1: "/home/zepher/work/Omega_vNext/audit/stage1_linux_v62.log"
      supervisor: "/home/zepher/work/Omega_vNext/audit/linux_stage1_supervisor.log"
      stage2: "/home/zepher/work/Omega_vNext/audit/stage2_compute.log"
    probe:
      - "ssh linux1-lx 'hostname; whoami; uptime'"
      - "ssh linux1-lx 'pgrep -af stage1_linux_base_etl.py || true'"

  windows1:
    alias: windows1-w1
    host: 100.123.90.25
    local_ip: 192.168.3.112
    user: jiazi
    os: windows
    role: "worker stage1/stage2"
    repo_root: "D:\\work\\Omega_vNext"
    outputs:
      stage1_base_l1: "D:\\Omega_frames\\v62_base_l1\\host=windows1"
      stage2_feature_l2: "D:\\Omega_frames\\v62_feature_l2\\host=windows1"
    logs:
      stage1: "C:\\Omega_vNext\\audit\\stage1_windows_v62.log"
      stage2: "D:\\work\\Omega_vNext\\audit\\stage2_compute.log"
    probe:
      - "ssh windows1-w1 'hostname && whoami'"
      - "python3 .codex/skills/omega-run-ops/scripts/ssh_ps.py windows1-w1 --command 'Get-ScheduledTask -TaskName \"Omega_v62_stage1_win\" | Select-Object TaskName,State'"

