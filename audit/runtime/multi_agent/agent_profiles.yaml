version: 2
active:
  oracle: codex_xhigh
  mechanic: gemini_flash
  auditor_primary: gemini_pro
  auditor_secondary: codex_xhigh
  debug_scribe: codex_medium
roles:
  oracle:
    provider: codex_cli
    mode: read_only
    profiles:
      codex_xhigh:
        model: gpt-5.3-codex
        codex_config:
          model_reasoning_effort: xhigh
      codex_medium:
        model: gpt-5.3-codex
        codex_config:
          model_reasoning_effort: medium
  mechanic:
    provider: gemini_cli
    mode: write_enabled
    profiles:
      gemini_flash:
        model: gemini-3-flash
        extra_args:
        - --approval-mode
        - auto_edit
        - --output-format
        - text
      gemini_pro:
        model: gemini-3-pro
        extra_args:
        - --approval-mode
        - auto_edit
        - --output-format
        - text
  auditor_primary:
    provider: gemini_cli
    mode: read_only
    profiles:
      gemini_pro:
        model: gemini-3-pro
        extra_args:
        - --approval-mode
        - plan
        - --output-format
        - text
      gemini_flash:
        model: gemini-3-flash
        extra_args:
        - --approval-mode
        - plan
        - --output-format
        - text
  auditor_secondary:
    provider: codex_cli
    mode: read_only
    profiles:
      codex_xhigh:
        model: gpt-5.3-codex
        codex_config:
          model_reasoning_effort: xhigh
      codex_medium:
        model: gpt-5.3-codex
        codex_config:
          model_reasoning_effort: medium
  debug_scribe:
    provider: codex_cli
    mode: write_enabled
    profiles:
      codex_medium:
        model: gpt-5.3-codex
        codex_config:
          model_reasoning_effort: medium
      codex_xhigh:
        model: gpt-5.3-codex
        codex_config:
          model_reasoning_effort: xhigh
extensions:
  enabled: []
  catalog: {}
